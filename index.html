<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>HANA STAY 주차관리</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@500&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3248;
    --accent: #4f8ef7;
    --green: #3ecf8e;
    --red: #f75c5c;
    --yellow: #f7c94f;
    --text: #e8eaf2;
    --text2: #8b90a8;
    --text3: #555a72;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    padding: 14px;
  }

  /* ── 헤더 ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .logo { font-size: 16px; font-weight: 700; }
  .logo span { color: var(--accent); }
  .header-right { display: flex; gap: 8px; align-items: center; }

  .sync-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 5px 12px;
    border-radius: 8px;
    font-size: 11px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  .sync-btn:hover { border-color: var(--accent); color: var(--accent); }
  .sync-btn.syncing { color: var(--yellow); border-color: var(--yellow); }

  /* ── 통계 ── */
  .stats {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .stat-card {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 9px 6px;
    text-align: center;
  }
  .stat-num { font-size: 20px; font-weight: 700; font-family: 'DM Mono', monospace; }
  .stat-num.red { color: var(--red); }
  .stat-num.green { color: var(--green); }
  .stat-num.yellow { color: var(--yellow); }
  .stat-label { font-size: 10px; color: var(--text2); margin-top: 1px; }

  /* ── 날짜 네비게이터 ── */
  .date-nav {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .date-nav-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text2);
    width: 32px; height: 32px;
    border-radius: 8px;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .date-nav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .date-nav-center {
    flex: 1;
    display: flex;
    gap: 6px;
    align-items: center;
  }
  #viewDate {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 10px;
    border-radius: 8px;
    font-size: 13px;
    font-family: inherit;
    outline: none;
  }
  #viewDate:focus { border-color: var(--accent); }
  .date-today-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 5px 10px;
    border-radius: 8px;
    font-size: 11px;
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
  }
  .date-today-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── 배너 ── */
  .today-banner {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 9px 14px;
    margin-bottom: 12px;
    font-size: 12px;
    color: var(--text2);
  }
  .today-banner strong { color: var(--text); }

  /* ── 맵 래퍼 ── */
  .map-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 10px 18px;
  }

  .map-title {
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 1px;
    text-align: center;
    margin-bottom: 10px;
  }

  .legend {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--text2); }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; }

  .road {
    background: var(--surface2);
    border: 1px dashed var(--border);
    border-radius: 6px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 3px;
    margin-bottom: 10px;
  }

  /* ── 열 레이아웃 ── */
  .lanes-map {
    display: flex;
    justify-content: center;
    gap: 6px;
  }

  .lane-col {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .lane-label {
    font-size: 10px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    margin-bottom: 5px;
  }

  /* ── 슬롯 블록 ── */
  .slot-block {
    width: 76px;
    height: 64px;
    border-radius: 8px;
    cursor: pointer;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    transition: transform 0.12s, box-shadow 0.12s;
    border: 2px solid transparent;
    -webkit-tap-highlight-color: transparent;
  }

  @media (min-width: 400px) { .slot-block { width: 84px; height: 70px; } }
  @media (min-width: 500px) { .slot-block { width: 96px; height: 78px; } }

  .slot-block:hover { transform: scale(1.05); box-shadow: 0 4px 18px rgba(0,0,0,0.5); z-index: 2; }
  .slot-block:active { transform: scale(0.94); }

  .slot-block.empty { background: var(--surface2); border-color: var(--border); }
  .slot-block.outer-occ { background: linear-gradient(150deg,#1d4f8a,#163d70); border-color: var(--accent); }
  .slot-block.inner-occ { background: linear-gradient(150deg,#1e3870,#122858); border-color: #6b7ef7; }
  .slot-block.alert-slot {
    background: linear-gradient(150deg,#4a3800,#382800);
    border-color: var(--yellow);
    animation: alertPulse 1.6s infinite;
  }
  @keyframes alertPulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(247,201,79,0); }
    50% { box-shadow: 0 0 0 5px rgba(247,201,79,0.2); }
  }

  /* 블록 내부 텍스트 — 호실 + 차량번호만 크게 */
  .s-pos {
    font-size: 9px;
    font-family: 'DM Mono', monospace;
    color: rgba(255,255,255,0.3);
    line-height: 1;
    position: absolute;
    top: 5px; left: 7px;
  }
  .empty .s-pos { color: var(--text3); }

  .s-alert {
    position: absolute;
    top: 3px; right: 5px;
    font-size: 11px;
  }

  .s-room {
    font-size: 17px;
    font-weight: 700;
    color: white;
    line-height: 1;
  }
  @media (min-width: 400px) { .s-room { font-size: 19px; } }

  .s-car {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: rgba(255,255,255,0.7);
    line-height: 1;
    max-width: 72px;
    text-align: center;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  @media (min-width: 400px) { .s-car { font-size: 11px; max-width: 80px; } }

  .s-p-icon { font-size: 22px; color: var(--text3); line-height: 1; }

  .s-pending {
    position: absolute;
    bottom: 4px; right: 5px;
    font-size: 9px;
    color: var(--purple);
    font-family: 'DM Mono', monospace;
    line-height: 1;
  }

  /* 이중주차 구분 */
  .double-sep {
    width: 100%;
    height: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    margin: 2px 0;
  }
  .double-sep::before {
    content: '';
    position: absolute;
    left: 4px; right: 4px;
    height: 1px;
    background: var(--border);
  }
  .double-sep-label {
    background: var(--surface);
    padding: 0 4px;
    font-size: 8px;
    color: var(--text3);
    position: relative;
    z-index: 1;
  }

  .entrance {
    text-align: center;
    margin-top: 12px;
    font-size: 10px;
    color: var(--text3);
  }
  .entrance-arrow { font-size: 14px; color: var(--green); display: block; }

  /* ── 상세 팝업 (탭 시) ── */
  .detail-popup {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: 90;
    align-items: flex-end;
    justify-content: center;
  }
  .detail-popup.open { display: flex; }

  .detail-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    padding: 20px 20px 28px;
    width: 100%;
    max-width: 480px;
    max-height: 80vh;
    overflow-y: auto;
    animation: slideUp 0.22s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(30px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .detail-handle {
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 16px;
  }

  .detail-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .detail-room { font-size: 24px; font-weight: 700; line-height: 1; }
  .detail-pos { font-size: 12px; color: var(--text2); margin-top: 4px; }

  .detail-badge {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: 600;
  }
  .badge-ok { background: rgba(79,142,247,0.15); color: var(--accent); border: 1px solid rgba(79,142,247,0.3); }
  .badge-warn { background: rgba(247,201,79,0.15); color: var(--yellow); border: 1px solid rgba(247,201,79,0.3); }

  .detail-rows { display: flex; flex-direction: column; gap: 10px; margin-bottom: 18px; }

  .detail-row {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface2);
    border-radius: 10px;
    padding: 11px 14px;
  }
  .detail-row-icon { font-size: 16px; width: 20px; text-align: center; flex-shrink: 0; }
  .detail-row-content { flex: 1; }
  .detail-row-label { font-size: 10px; color: var(--text2); margin-bottom: 2px; }
  .detail-row-value { font-size: 14px; font-weight: 500; }
  .detail-row-value.mono { font-family: 'DM Mono', monospace; font-size: 15px; }

  .call-btn {
    background: var(--green);
    color: #0a1a12;
    border: none;
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    flex-shrink: 0;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }

  .detail-btn-row { display: flex; gap: 8px; }
  .btn {
    flex: 1; padding: 12px; border-radius: 10px;
    font-size: 14px; font-weight: 600; font-family: inherit;
    cursor: pointer; border: none; transition: opacity 0.2s;
  }
  .btn:active { opacity: 0.7; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-danger { background: var(--red); color: white; }
  .btn-cancel { background: var(--surface2); color: var(--text2); }

  /* ── 수정 모달 ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    padding: 22px 20px 36px;
    width: 100%;
    max-width: 480px;
    animation: slideUp 0.22s ease;
  }
  .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 18px; }
  .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 3px; }
  .modal-subtitle { font-size: 12px; color: var(--text2); margin-bottom: 18px; }

  .form-group { margin-bottom: 12px; }
  .form-label { font-size: 12px; color: var(--text2); margin-bottom: 5px; display: block; }
  .form-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus { border-color: var(--accent); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .btn-row { display: flex; gap: 10px; margin-top: 18px; }

  /* ── 토스트 ── */
  .toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 20px;
    font-size: 13px;
    z-index: 200;
    transition: transform 0.3s ease;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="logo">HANA <span>STAY</span> 주차</div>
  <div class="header-right">
    <button class="sync-btn" id="syncBtn" onclick="syncData()">↻ 동기화</button>
  </div>
</header>

<div class="stats">
  <div class="stat-card">
    <div class="stat-num red" id="statOccupied">0</div>
    <div class="stat-label">사용 중</div>
  </div>
  <div class="stat-card">
    <div class="stat-num green" id="statFree">10</div>
    <div class="stat-label">빈자리</div>
  </div>
  <div class="stat-card">
    <div class="stat-num yellow" id="statAlert">0</div>
    <div class="stat-label">연락필요</div>
  </div>
</div>

<div class="date-nav">
  <button class="date-nav-btn" onclick="shiftDate(-1)">‹</button>
  <div class="date-nav-center">
    <input type="date" id="viewDate" onchange="render()">
    <button class="date-today-btn" onclick="goToday()">오늘</button>
  </div>
  <button class="date-nav-btn" onclick="shiftDate(1)">›</button>
</div>
<div class="today-banner" id="todayBanner">로딩 중...</div>

<div class="map-wrap">
  <div class="map-title">P A R K I N G &nbsp; M A P</div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--surface2);border:1px solid var(--border)"></div>빈자리</div>
    <div class="legend-item"><div class="legend-dot" style="background:#1d4f8a;border:1px solid var(--accent)"></div>바깥</div>
    <div class="legend-item"><div class="legend-dot" style="background:#1e3870;border:1px solid #6b7ef7"></div>안쪽</div>
    <div class="legend-item"><div class="legend-dot" style="background:#4a3800;border:1px solid var(--yellow)"></div>⚠ 연락필요</div>
  </div>
  <div class="road">← &nbsp;&nbsp; 도 &nbsp; 로 &nbsp;&nbsp; →</div>
  <div class="lanes-map" id="lanesMap"></div>
  <div class="entrance">
    <span class="entrance-arrow">↑</span>
    진입구
  </div>
</div>

<!-- 상세 팝업 -->
<div class="detail-popup" id="detailPopup">
  <div class="detail-card">
    <div class="detail-handle"></div>
    <div class="detail-header">
      <div>
        <div class="detail-room" id="detailRoom">—</div>
        <div class="detail-pos" id="detailPos"></div>
      </div>
      <div class="detail-badge" id="detailBadge"></div>
    </div>
    <div class="detail-rows">
      <div class="detail-row">
        <div class="detail-row-icon">🚗</div>
        <div class="detail-row-content">
          <div class="detail-row-label">차량번호</div>
          <div class="detail-row-value mono" id="detailCar">—</div>
        </div>
      </div>
      <div class="detail-row">
        <div class="detail-row-icon">📅</div>
        <div class="detail-row-content">
          <div class="detail-row-label">입차 ~ 출차</div>
          <div class="detail-row-value" id="detailDates">—</div>
        </div>
      </div>
      <div class="detail-row" id="detailContactRow" style="display:none">
        <div class="detail-row-icon">📞</div>
        <div class="detail-row-content">
          <div class="detail-row-label">연락처</div>
          <div class="detail-row-value mono" id="detailContact">—</div>
        </div>
        <a class="call-btn" id="callBtn" href="#">📞 전화</a>
      </div>
      <div class="detail-row" id="detailMemoRow" style="display:none">
        <div class="detail-row-icon">📝</div>
        <div class="detail-row-content">
          <div class="detail-row-label">메모</div>
          <div class="detail-row-value" id="detailMemo">—</div>
        </div>
      </div>
    </div>
    <!-- 대기 예약 목록 -->
    <div id="pendingList" style="margin-bottom:12px;display:none;">
      <div style="font-size:11px;color:var(--text2);margin-bottom:6px;">대기 예약</div>
      <div id="pendingItems"></div>
    </div>
    <div class="detail-btn-row">
      <button class="btn btn-cancel" onclick="closeDetail()">닫기</button>
      <button class="btn btn-danger" onclick="clearFromDetail()">현재 비우기</button>
      <button class="btn btn-primary" onclick="openEditFromDetail()">수정</button>
    </div>
    <div style="margin-top:8px;">
      <button class="btn btn-primary" style="width:100%;background:var(--purple);" onclick="openAddReservation()">+ 다음 예약 추가</button>
    </div>
  </div>
</div>

<!-- 수정/등록 모달 -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle">주차 등록</div>
    <div class="modal-subtitle" id="modalSubtitle"></div>
    <div class="form-group">
      <label class="form-label">호실 번호</label>
      <input class="form-input" id="inputRoom" placeholder="예: 301" type="text">
    </div>
    <div class="form-group">
      <label class="form-label">차량 번호</label>
      <input class="form-input" id="inputCar" placeholder="예: 12가 3456" type="text">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">입차일</label>
        <input class="form-input" id="inputStart" type="date" onchange="updateStartHint()">
      </div>
      <div class="form-group">
        <label class="form-label">출차일 <span id="startHint" style="color:var(--accent);font-size:11px;font-weight:400;"></span></label>
        <input class="form-input" id="inputEnd" type="date">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">연락처</label>
      <input class="form-input" id="inputContact" placeholder="010-0000-0000" type="tel">
    </div>
    <div class="form-group">
      <label class="form-label">메모 (선택)</label>
      <input class="form-input" id="inputMemo" placeholder="특이사항 등" type="text">
    </div>
    <div class="btn-row">
      <button class="btn btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="saveSlot()">저장</button>
    </div>
    <!-- 대기예약 리스트 -->
    <div id="modalPendingList" style="display:none;margin-top:16px;border-top:1px solid var(--border);padding-top:14px;">
      <div style="font-size:11px;color:var(--text2);margin-bottom:8px;">대기 예약</div>
      <div id="modalPendingItems"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const WORKER_URL = 'https://parking.vagabond1984.workers.dev';
const KV_KEY = 'parking_data';

// ── 날짜 헬퍼 ──────────────────────────────────
function todayStr() { return new Date().toISOString().slice(0,10); }
function getViewDate() { return document.getElementById('viewDate')?.value || todayStr(); }
function goToday() { document.getElementById('viewDate').value = todayStr(); render(); }
function shiftDate(d) {
  const dt = new Date(getViewDate()); dt.setDate(dt.getDate() + d);
  document.getElementById('viewDate').value = dt.toISOString().slice(0,10);
  render();
}

const LANES = [
  { id:'L1', label:'1열', slots:[
    { id:'L1-1', pos:'1-①', position:'outer' },
    { id:'L1-2', pos:'1-②', position:'inner' },
  ]},
  { id:'L2', label:'2열', slots:[
    { id:'L2-1', pos:'2-①', position:'outer' },
    { id:'L2-2', pos:'2-②', position:'inner' },
  ]},
  { id:'L3', label:'3열', slots:[
    { id:'L3-1', pos:'3-①', position:'outer' },
    { id:'L3-2', pos:'3-②', position:'inner' },
    { id:'L3-3', pos:'3-③', position:'inner' },
  ]},
  { id:'L4', label:'4열', slots:[
    { id:'L4-1', pos:'4-①', position:'outer' },
    { id:'L4-2', pos:'4-②', position:'inner' },
    { id:'L4-3', pos:'4-③', position:'inner' },
  ]},
];

// parkingData 구조: { slotId: [ {room,car,start,end,contact,memo}, ... ] }
// 배열로 여러 예약 저장, 날짜순 정렬
let parkingData = {};
let currentSlotId = null;
let currentSlotMeta = null;
let editingResvIdx = null; // 수정 중인 예약 인덱스

// ── 자동 출차 정리 ──────────────────────────────
function autoExpire() {
  const tomorrow = new Date();
  tomorrow.setDate(tomorrow.getDate() + 1);
  const tomorrowStr = tomorrow.toISOString().slice(0,10);
  let changed = false;
  Object.keys(parkingData).forEach(slotId => {
    const arr = parkingData[slotId];
    if (!Array.isArray(arr)) return;
    const filtered = arr.filter(r => r.end >= tomorrowStr);
    if (filtered.length !== arr.length) { parkingData[slotId] = filtered; changed = true; }
    if (filtered.length === 0) delete parkingData[slotId];
  });
  return changed;
}

// ── 날짜 겹침 체크 ──────────────────────────────
// 기존 예약 배열에서 [start, end] 기간과 겹치는 예약이 있는지 확인
// skipIdx: 수정 시 자기 자신 제외
function hasOverlap(slotId, start, end, skipIdx = -1) {
  const arr = parkingData[slotId];
  if (!Array.isArray(arr)) return false;
  return arr.some((r, i) => {
    if (i === skipIdx) return false;
    // 겹침: start < r.end && end > r.start
    return start < r.end && end > r.start;
  });
}

// ── 특정 날짜에 활성인 예약 가져오기 ──────────────
function getActiveResvOnDate(slotId, date) {
  const arr = parkingData[slotId];
  if (!Array.isArray(arr)) return null;
  return arr.find(r => r.start <= date && r.end > date) || null;
}

// ── KV 연동 ────────────────────────────────────
async function loadData() {
  try {
    const res = await fetch(`${WORKER_URL}/kv?key=${KV_KEY}`);
    if (res.ok) {
      const json = await res.json();
      const raw = json.value ? JSON.parse(json.value) : {};
      // 구버전 단일객체 → 배열 마이그레이션
      Object.keys(raw).forEach(k => {
        parkingData[k] = Array.isArray(raw[k]) ? raw[k] : [raw[k]];
      });
    }
  } catch(e) {
    const local = localStorage.getItem('parking_data');
    if (local) {
      const raw = JSON.parse(local);
      Object.keys(raw).forEach(k => {
        parkingData[k] = Array.isArray(raw[k]) ? raw[k] : [raw[k]];
      });
    }
  }
  const expired = autoExpire();
  if (expired) await saveData();
  document.getElementById('viewDate').value = todayStr();
  render();
}

async function saveData() {
  localStorage.setItem('parking_data', JSON.stringify(parkingData));
  try {
    await fetch(`${WORKER_URL}/kv`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ key: KV_KEY, value: JSON.stringify(parkingData) })
    });
  } catch(e) {}
}

async function syncData() {
  const btn = document.getElementById('syncBtn');
  btn.textContent = '동기화 중...';
  btn.classList.add('syncing');
  parkingData = {};
  await loadData();
  btn.textContent = '↻ 동기화';
  btn.classList.remove('syncing');
  showToast('동기화 완료');
}

// ── 연락필요 판단 ──────────────────────────────
function isAlert(lane, idx, viewDate) {
  if (lane.slots[idx].position !== 'outer') return false;
  const hasInner = lane.slots.some(s => s.position === 'inner' && getActiveResvOnDate(s.id, viewDate));
  return hasInner && !!getActiveResvOnDate(lane.slots[idx].id, viewDate);
}

function fmtDateFull(d) {
  if (!d) return '';
  return d.replace(/-/g, '. ');
}

// ── 렌더링 ─────────────────────────────────────
function render() {
  const viewDate = getViewDate();
  const today = todayStr();
  const isToday = viewDate === today;
  let occupied = 0, alertCount = 0;
  const mapEl = document.getElementById('lanesMap');
  mapEl.innerHTML = '';

  LANES.forEach(lane => {
    const col = document.createElement('div');
    col.className = 'lane-col';
    const lbl = document.createElement('div');
    lbl.className = 'lane-label';
    lbl.textContent = lane.label;
    col.appendChild(lbl);

    lane.slots.forEach((slot, idx) => {
      const resv = getActiveResvOnDate(slot.id, viewDate);
      const alert = isAlert(lane, idx, viewDate);
      if (resv) occupied++;
      if (alert) alertCount++;

      if (idx > 0 && slot.position === 'inner' && lane.slots[idx-1].position === 'outer') {
        const sep = document.createElement('div');
        sep.className = 'double-sep';
        sep.innerHTML = '<span class="double-sep-label">↕</span>';
        col.appendChild(sep);
      }

      const block = document.createElement('div');
      block.className = 'slot-block';
      if (alert) block.classList.add('alert-slot');
      else if (resv && slot.position === 'outer') block.classList.add('outer-occ');
      else if (resv && slot.position === 'inner') block.classList.add('inner-occ');
      else block.classList.add('empty');

      if (resv) {
        block.onclick = () => openDetail(slot.id, lane.label, slot.pos, alert, viewDate);
      } else {
        block.onclick = () => openModal(slot.id, lane.label, slot.pos, null);
      }

      // 대기 예약 수 뱃지
      const allResvs = parkingData[slot.id] || [];
      const futureCount = allResvs.filter(r => r.start > viewDate || (r.start <= viewDate && r.end > viewDate)).length;
      const pendingCount = futureCount - (resv ? 1 : 0);

      if (resv) {
        block.innerHTML = `
          <div class="s-pos">${slot.pos}</div>
          ${alert ? '<div class="s-alert">⚠️</div>' : ''}
          ${pendingCount > 0 ? `<div class="s-pending">+${pendingCount}</div>` : ''}
          <div class="s-room">${resv.room}호</div>
          <div class="s-car">${resv.car}</div>`;
      } else {
        block.innerHTML = `
          <div class="s-pos">${slot.pos}</div>
          ${pendingCount > 0 ? `<div class="s-pending">예약${pendingCount}</div>` : ''}
          <div class="s-p-icon">P</div>`;
      }

      col.appendChild(block);
    });

    mapEl.appendChild(col);
  });

  document.getElementById('statOccupied').textContent = occupied;
  document.getElementById('statFree').textContent = 10 - occupied;
  document.getElementById('statAlert').textContent = alertCount;

  // 배너
  const ds = viewDate.slice(5).replace('-', '/');
  const banner = document.getElementById('todayBanner');
  if (isToday) {
    const checkouts = [];
    Object.keys(parkingData).forEach(slotId => {
      (parkingData[slotId] || []).forEach(r => { if (r.end === today) checkouts.push(r.room + '호'); });
    });
    if (checkouts.length) {
      banner.innerHTML = `오늘 <strong>${ds}</strong> 출차 예정: <strong style="color:var(--yellow)">${checkouts.join(', ')}</strong>`;
    } else {
      banner.innerHTML = `오늘 <strong>${ds}</strong> — 출차 예정 없음`;
    }
  } else {
    const isPast = viewDate < today;
    banner.innerHTML = `<strong>${ds}</strong> 기준 — 주차 중 ${occupied}대 / 빈자리 ${10 - occupied}개 ${isPast ? '<span style="color:var(--text3)">(과거)</span>' : '<span style="color:var(--accent)">(미래)</span>'}`;
  }
}

// ── 상세 팝업 ──────────────────────────────────
function openDetail(slotId, laneLabel, slotPos, alert, viewDate) {
  currentSlotId = slotId;
  currentSlotMeta = { laneLabel, slotPos };
  const vd = viewDate || getViewDate();
  let resv = getActiveResvOnDate(slotId, vd);
  const allResvs = parkingData[slotId] || [];
  if (!resv) {
    // 활성 예약 없으면 가장 가까운 미래 예약
    resv = allResvs.filter(r => r.start >= vd).sort((a,b) => a.start.localeCompare(b.start))[0];
  }
  if (!resv) return;
  editingResvIdx = allResvs.indexOf(resv);

  document.getElementById('detailRoom').textContent = resv.room + '호';
  document.getElementById('detailPos').textContent = `${laneLabel} · ${slotPos}`;

  const badge = document.getElementById('detailBadge');
  if (alert) {
    badge.textContent = '⚠ 연락필요';
    badge.className = 'detail-badge badge-warn';
  } else {
    badge.textContent = '주차 중';
    badge.className = 'detail-badge badge-ok';
  }

  document.getElementById('detailCar').textContent = resv.car;
  document.getElementById('detailDates').textContent = `${fmtDateFull(resv.start)} → ${fmtDateFull(resv.end)}`;

  const contactRow = document.getElementById('detailContactRow');
  if (resv.contact) {
    contactRow.style.display = 'flex';
    document.getElementById('detailContact').textContent = resv.contact;
    document.getElementById('callBtn').href = `tel:${resv.contact.replace(/[^0-9+]/g,'')}`;
  } else { contactRow.style.display = 'none'; }

  const memoRow = document.getElementById('detailMemoRow');
  if (resv.memo) {
    memoRow.style.display = 'flex';
    document.getElementById('detailMemo').textContent = resv.memo;
  } else { memoRow.style.display = 'none'; }

  // 대기 예약 목록
  const pending = allResvs.filter((r, i) => i !== editingResvIdx);
  const pendingList = document.getElementById('pendingList');
  const pendingItems = document.getElementById('pendingItems');
  if (pending.length > 0) {
    pendingList.style.display = 'block';
    // 날짜순 정렬
    const sortedPending = [...pending].sort((a,b) => a.start.localeCompare(b.start));
    pendingItems.innerHTML = sortedPending.map((r) => {
      const realIdx = allResvs.indexOf(r);
      const startMd = r.start.slice(5).replace('-','/');
      const endMd = r.end.slice(5).replace('-','/');
      return `<div style="background:var(--surface2);border-radius:8px;padding:10px 12px;margin-bottom:6px;">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div>
            <span style="font-size:12px;color:var(--accent);font-weight:700;">📅 ${startMd} → ${endMd}</span>
          </div>
          <div style="display:flex;gap:8px;align-items:center;">
            <button onclick="editResvByIdx('${slotId}', ${realIdx})" style="background:none;border:1px solid var(--accent);color:var(--accent);cursor:pointer;font-size:11px;padding:2px 8px;border-radius:4px;">수정</button>
            <button onclick="deleteResvByIdx('${slotId}', ${realIdx})" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:14px;">✕</button>
          </div>
        </div>
        <div style="margin-top:4px;display:flex;gap:12px;align-items:center;">
          <span style="font-weight:700;font-size:13px;">${r.room}호</span>
          <span style="color:var(--text2);font-size:12px;">${r.car}</span>
          ${r.contact ? `<span style="color:var(--text2);font-size:12px;">${r.contact}</span>` : ''}
        </div>
      </div>`;
    }).join('');
  } else {
    pendingList.style.display = 'none';
  }

  document.getElementById('detailPopup').classList.add('open');
}

function closeDetail() {
  document.getElementById('detailPopup').classList.remove('open');
}

function openEditFromDetail() {
  closeDetail();
  openModal(currentSlotId, currentSlotMeta.laneLabel, currentSlotMeta.slotPos, editingResvIdx);
}

async function clearFromDetail() {
  if (!confirm('현재 주차 정보를 삭제할까요?')) return;
  const arr = parkingData[currentSlotId] || [];
  arr.splice(editingResvIdx, 1);
  if (arr.length === 0) delete parkingData[currentSlotId];
  else parkingData[currentSlotId] = arr;
  await saveData();
  render();
  closeDetail();
  showToast('삭제했어요');
}

async function deleteResvByIdx(slotId, idx) {
  if (!confirm('이 예약을 삭제할까요?')) return;
  const arr = parkingData[slotId] || [];
  arr.splice(idx, 1);
  if (arr.length === 0) delete parkingData[slotId];
  else parkingData[slotId] = arr;
  await saveData();
  closeDetail();
  render();
  showToast('예약을 삭제했어요');
}

function openAddReservation() {
  closeDetail();
  openModal(currentSlotId, currentSlotMeta.laneLabel, currentSlotMeta.slotPos, null);
}

function editResvByIdx(slotId, idx) {
  closeDetail();
  openModal(slotId, currentSlotMeta.laneLabel, currentSlotMeta.slotPos, idx);
}

function updateStartHint() {
  const startVal = document.getElementById('inputStart').value;
  const hint = document.getElementById('startHint');
  if (hint && startVal) {
    hint.textContent = '입차: ' + startVal.slice(5).replace('-', '/');
  } else if (hint) {
    hint.textContent = '';
  }
}

// ── 등록/수정 모달 ──────────────────────────────
function openModal(slotId, laneLabel, slotPos, resvIdx) {
  currentSlotId = slotId;
  currentSlotMeta = { laneLabel, slotPos };
  editingResvIdx = resvIdx;

  const arr = parkingData[slotId] || [];
  const resv = (resvIdx !== null && resvIdx >= 0) ? arr[resvIdx] : null;

  document.getElementById('modalTitle').textContent = resv ? '주차 정보 수정' : '주차 등록';
  document.getElementById('modalSubtitle').textContent = `${laneLabel} · ${slotPos}`;
  document.getElementById('inputRoom').value = resv?.room || '';
  document.getElementById('inputCar').value = resv?.car || '';
  document.getElementById('inputStart').value = resv?.start || todayStr();
  document.getElementById('inputEnd').value = resv?.end || '';
  // 입차일 힌트 업데이트
  const hint = document.getElementById('startHint');
  if (hint) {
    const sv = resv?.start || todayStr();
    hint.textContent = '입차: ' + sv.slice(5).replace('-', '/');
  }
  document.getElementById('inputContact').value = resv?.contact || '';
  document.getElementById('inputMemo').value = resv?.memo || '';

  // 대기예약 리스트 렌더링 (현재 수정 중인 것 제외)
  const today = todayStr();
  const skipIdx = (resvIdx !== null && resvIdx >= 0) ? resvIdx : -1;
  const pending = arr.filter((r, i) => i !== skipIdx && r.end > today)
                     .sort((a, b) => a.start.localeCompare(b.start));
  const modalPendingList = document.getElementById('modalPendingList');
  const modalPendingItems = document.getElementById('modalPendingItems');
  if (pending.length > 0) {
    modalPendingList.style.display = 'block';
    modalPendingItems.innerHTML = pending.map(r => {
      const realIdx = arr.indexOf(r);
      const startMd = r.start.slice(5).replace('-', '/');
      const endMd = r.end.slice(5).replace('-', '/');
      return `<div style="background:var(--surface2);border-radius:8px;padding:10px 12px;margin-bottom:6px;">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <span style="font-size:12px;color:var(--accent);font-weight:700;">📅 ${startMd} → ${endMd}</span>
          <div style="display:flex;gap:8px;">
            <button onclick="editResvByIdx('${slotId}', ${realIdx})" style="background:none;border:1px solid var(--accent);color:var(--accent);cursor:pointer;font-size:11px;padding:2px 8px;border-radius:4px;">수정</button>
            <button onclick="deleteResvByIdx('${slotId}', ${realIdx})" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:14px;">✕</button>
          </div>
        </div>
        <div style="margin-top:4px;display:flex;gap:12px;">
          <span style="font-weight:700;font-size:13px;">${r.room}호</span>
          <span style="color:var(--text2);font-size:12px;">${r.car}</span>
          ${r.contact ? `<span style="color:var(--text2);font-size:12px;">${r.contact}</span>` : ''}
        </div>
      </div>`;
    }).join('');
  } else {
    modalPendingList.style.display = 'none';
  }

  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

async function saveSlot() {
  const room = document.getElementById('inputRoom').value.trim();
  const car = document.getElementById('inputCar').value.trim();
  const start = document.getElementById('inputStart').value;
  const end = document.getElementById('inputEnd').value;
  const contact = document.getElementById('inputContact').value.trim();
  const memo = document.getElementById('inputMemo').value.trim();

  if (!room || !car || !start || !end) {
    showToast('호실, 차량번호, 기간을 입력해주세요');
    return;
  }
  if (start >= end) {
    showToast('출차일은 입차일보다 뒤여야 해요');
    return;
  }

  // 겹침 체크
  const skipIdx = (editingResvIdx !== null && editingResvIdx >= 0) ? editingResvIdx : -1;
  if (hasOverlap(currentSlotId, start, end, skipIdx)) {
    showToast('⚠ 이 슬롯에 겹치는 예약이 있어요');
    return;
  }

  if (!parkingData[currentSlotId]) parkingData[currentSlotId] = [];
  const arr = parkingData[currentSlotId];
  const newResv = { room, car, start, end, contact, memo };

  if (skipIdx >= 0) {
    arr[skipIdx] = newResv;
  } else {
    arr.push(newResv);
  }
  // 날짜순 정렬 후 editingResvIdx 재조정
  arr.sort((a, b) => a.start.localeCompare(b.start));
  editingResvIdx = arr.indexOf(newResv);

  await saveData();
  render();
  closeModal();
  showToast('저장됐어요');
}

// 배경 탭으로 닫기
document.getElementById('detailPopup').addEventListener('click', function(e) {
  if (e.target === this) closeDetail();
});
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── 초기 로드 + 자정 자동 정리 ─────────────────
loadData();

function scheduleAutoExpire() {
  const now = new Date();
  const midnight = new Date(now);
  midnight.setHours(24, 0, 1, 0);
  setTimeout(async () => {
    const expired = autoExpire();
    if (expired) { await saveData(); render(); }
    scheduleAutoExpire();
  }, midnight - now);
}
scheduleAutoExpire();
</script>
